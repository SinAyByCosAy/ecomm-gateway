spring.application.name=gateway

# each route is: if a request comes here, give it there
spring.cloud.gateway.server.webflux.routes[0].id=productservice
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/products/**
spring.cloud.gateway.server.webflux.routes[0].uri=lb://productservice

spring.cloud.gateway.server.webflux.routes[1].id=userservice
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/auth**
spring.cloud.gateway.server.webflux.routes[1].uri=lb://UserService

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=*